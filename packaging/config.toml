[honeypot]
listen_addr = "0.0.0.0:2222"
max_visits = 5
window_seconds = 60
max_tracked_ips = 100000
max_concurrent_connections = 1024
ban_queue_capacity = 4096
allowlist = ["127.0.0.1", "::1"]
banner = "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3\r\n"
read_after_banner_timeout_ms = 1500
close_delay_ms = 0

[admin]
listen_addr = "127.0.0.1:8080"
password = "replace-with-a-long-random-password"
inline_on_honeypot_port = false
inline_path_prefix = "/_honeypot_admin"
inline_probe_timeout_ms = 250
inline_request_timeout_ms = 3000
inline_max_request_bytes = 16384
allow_insecure_http = false
allow_legacy_get_password = false

[firewall]
backend = "nftables"
command_timeout_seconds = 15

[state]
banned_ips_path = "/var/lib/honeypot/banned_ips.json"

[webdav]
enabled = false
url = "https://example.com/remote.php/dav/files/user/honeypot/banned_ips.json"
username = "webdav-user"
password = "webdav-password"
curl_binary = "curl"
timeout_seconds = 15
debounce_seconds = 5
retry_initial_seconds = 5
retry_max_seconds = 300
allow_insecure_http = false

[logging]
directory = "/var/log/honeypot"
file_prefix = "honeypot"
level = "info"
retention_files = 7
retention_days = 14
stdout = true
